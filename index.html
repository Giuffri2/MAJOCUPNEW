<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJO CUP 2024 | Official Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #1a1a4d; /* Blu scuro profondo */
            --accent-magenta: #e6005c; /* Magenta del logo */
            --glow-color: rgba(230, 0, 92, 0.6);
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--primary-blue);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- SEZIONE 1: HERO (SFONDO) --- */
        .hero {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            /* ==========================================================
               INSERISCI QUI LA FOTO DI SFONDO (SQUADRA VINCITRICE)
               ========================================================== */
            background: linear-gradient(rgba(26, 26, 77, 0.6), rgba(26, 26, 77, 0.9)), 
                        url('SFONDO.jpg'); /* Qui puoi mettere la foto della squadra */
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Effetto Parallasse */
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            animation: fadeInDown 1.2s ease-out;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            font-size: 1.5rem;
            color: var(--accent-magenta);
        }

        /* --- SEZIONE 2: CONTENUTI --- */
        .content-section {
            min-height: 80vh;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, var(--primary-blue) 0%, #0c0c2e 100%);
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 50px;
            position: relative;
            text-transform: uppercase;
        }

        .section-title::after {
            content: '';
            width: 60px;
            height: 4px;
            background: var(--accent-magenta);
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- BOTTONI MODERNI --- */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 450px;
        }

        .btn {
            position: relative;
            padding: 20px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Bottone Attivo: Stile Neon/Glass */
        .btn-active {
            background: rgba(230, 0, 92, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-magenta);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-active:hover {
            background: var(--accent-magenta);
            box-shadow: 0 0 30px var(--glow-color);
            transform: translateY(-5px);
        }

        .btn-active::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn-active:hover::before {
            left: 100%;
        }

        /* Bottoni Disabilitati */
        .btn-disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        /* --- FOOTER --- */
        footer {
            width: 100%;
            padding: 40px 20px;
            background: #05051a;
            border-top: 1px solid rgba(230, 0, 92, 0.3);
            text-align: center;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
            text-decoration: none;
            font-size: 1.2rem;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .social-link:hover {
            color: var(--accent-magenta);
        }

        .social-link i {
            font-size: 2rem;
        }

        .copyright {
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* --- ANIMAZIONI --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>MAJO CUP 2026</h1>
        
        <div class="scroll-indicator">
            <i class="fas fa-chevron-down"></i>
        </div>
    </section>

    <section class="content-section">
        <h2 class="section-title">INFO</h2>
        
        <div class="btn-container">
            <a href="https://drive.google.com/file/d/10dWqV78IPsVwm5tBhO4KMQeuwMcl6zfM/view?usp=drive_link" target="_blank" class="btn btn-active">
                <i class="fas fa-file-pdf"></i> Scarica Regolamento PDF
            </a>

            <a href="#" class="btn btn-disabled">
                <i class="fas fa-calendar-alt"></i> Calendario (Prossimamente)
            </a>

            <a href="#" class="btn btn-disabled">
                <i class="fas fa-trophy"></i> Classifiche (Prossimamente)
            </a>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <a href="https://instagram.com/majocup_" target="_blank" class="social-link">
                <i class="fab fa-instagram"></i>
                <span>Seguici su Instagram</span>
            </a>
            
            <p class="copyright">
                © 2024 MAJOCUP - All right reserved.<br>
                
            </p>
        </div>
    </footer>

</body>
</html>
